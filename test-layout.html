<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Layout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      line-height: 1.6;
      color: #333;
    }
    
    #products {
      display: flex;
      gap: 2rem;
      padding: 4rem 2rem;
      background-color: #f0f0f0;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    
    .products-left {
      flex: 1;
      background-color: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .products-right {
      flex: 1;
      background-color: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: left;
    }
  </style>
</head>
<body>
  <div id="products">
    <div class="products-left">
      <h2>Our Products</h2>
      <p>Product carousel goes here</p>
    </div>
    <div class="products-right">
      <h2>Product Details & Purchase</h2>
      <p>Product details and purchase form go here</p>
    </div>
  </div>
</body>
</html>
